<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Một lá thư tình yêu chân thành và sâu sắc">
    <title>✨ Có một điều dành riêng cho em ✨</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-heart">❤️</div>
        <p>Đang chuẩn bị những điều tuyệt vời nhất...</p>
    </div>

    <!-- 3D Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Fireworks Canvas (hidden until triggered) -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-container">

        <!-- Audio Control Button -->
        <button id="audio-control" class="glass-btn hidden" title="Tắt/Mở Nhạc">
            🔊
        </button>

        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <h1 class="glow-text">💕 Em bé ơi 💕
                <br>✨ Có những điều ảnh chỉ muốn dành riêng cho em ✨</h1>

            <button id="open-letter-btn" class="glass-btn">💌 Mở lá thư</button>
        </div>

        <!-- Main Content Screen -->
        <div id="main-screen" class="screen hidden">

            <!-- ====== DOVE ANIMATION SCENE ====== -->
            <div id="dove-scene">
                <div id="dove-fly">
                    <!-- Chú chim bồ câu SVG -->
                    <svg id="dove-svg" viewBox="0 0 220 150" width="220" height="150" xmlns="http://www.w3.org/2000/svg">
                        <!-- Đuôi lông -->
                        <path d="M168 82 C184 64 202 70 199 85 C186 78 170 87 168 90" fill="#e0e0e0"/>
                        <path d="M170 76 C188 57 204 63 201 78 C187 71 172 80 170 84" fill="#ebebeb"/>

                        <!-- Cánh dưới (animated) -->
                        <g id="wing-bottom">
                            <path d="M108 88 C128 104 166 102 177 90 C155 94 128 87 110 81" fill="#c8c8c8"/>
                        </g>

                        <!-- Thân -->
                        <ellipse cx="118" cy="84" rx="58" ry="24" fill="white"/>

                        <!-- Cánh trên (animated) -->
                        <g id="wing-top">
                            <path d="M108 76 C128 40 172 28 184 52 C160 52 132 64 112 80" fill="white"/>
                            <path d="M108 79 C132 34 176 22 186 50 C160 50 133 66 112 82" fill="#f2f2f2" opacity="0.6"/>
                        </g>

                        <!-- Cổ -->
                        <ellipse cx="70" cy="74" rx="24" ry="20" fill="white"/>

                        <!-- Đầu -->
                        <circle cx="47" cy="60" r="22" fill="white"/>

                        <!-- Mỏ -->
                        <path d="M27 58 L4 63 L27 68 Z" fill="#f5c518"/>
                        <path d="M27 58 L4 63 L27 61" fill="#c9a000"/>

                        <!-- Mắt -->
                        <circle cx="40" cy="54" r="5" fill="#1a1a2e"/>
                        <circle cx="38.5" cy="52.5" r="2" fill="white"/>
                        <circle cx="40" cy="54" r="1" fill="#444"/>

                    <!-- Glow dưới chim -->
                        <ellipse cx="110" cy="142" rx="44" ry="6" fill="rgba(255,255,255,0.12)" id="dove-glow"/>
                    </svg>
                </div>
                <!-- Lá thư nhỏ: ở NGOÀI dove-fly → không bị kéo theo chim -->
                <div id="mini-letter">
                    <svg width="90" height="68" viewBox="0 0 90 68">
                        <defs>
                            <linearGradient id="envG" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#fffdf0"/>
                                <stop offset="100%" style="stop-color:#ffedb0"/>
                            </linearGradient>
                        </defs>
                        <rect x="1" y="1" width="88" height="66" rx="6" fill="url(#envG)" stroke="#e8c020" stroke-width="2"/>
                        <path d="M1 1 L45 36 L89 1" fill="none" stroke="#e8c020" stroke-width="2"/>
                        <path d="M1 67 L33 36" fill="none" stroke="#ddb800" stroke-width="1.5"/>
                        <path d="M89 67 L57 36" fill="none" stroke="#ddb800" stroke-width="1.5"/>
                        <text x="45" y="58" text-anchor="middle" font-size="18" fill="#e84393" font-family="serif">❤</text>
                    </svg>
                    <div class="ml-sparkle">✨</div>
                </div>
            </div>

            <div id="text-container">
                <p id="typewriter-text"></p>
            </div>

            <!-- Heart and Rotating Images -->
            <div id="heart-gallery-container" class="hidden">
                <div class="gallery-wrapper">
                    <div class="image-spinner">
                        <img src="z7987408132280_b9515decb7cbd6c53dadfa29886b0fc3.jpg" alt="Memory 1" style="--i:1;">
                        <img src="z7987408132659_fa4cae9623a20bfc302db75b13a3d9d7.jpg" alt="Memory 2" style="--i:2;">
                        <img src="z7987408135527_557b186a51bd96111cda97acfb01214a.jpg" alt="Memory 3" style="--i:3;">
                        <img src="z7987408139590_40014b19a30b67cd19be74b47874628b.jpg" alt="Memory 4" style="--i:4;">
                        <img src="z7987408144442_8baad70d77ec90ada8533ad1f51138b9.jpg" alt="Memory 5" style="--i:5;">
                    </div>
                    <div class="beating-heart"></div>
                </div>
                <button id="final-btn" class="glass-btn hidden">❤️ Waaaa nhìu nhìn hăm nè ❤️</button>
            </div>
        </div>

        <!-- Fireworks Screen -->
        <div id="fireworks-screen" class="screen hidden">
            <div id="fireworks-message">

                <!-- Animated heart + title -->
                <div class="fw-heart">❤️</div>
                <h2 class="fw-title">Anh thương em <br>nhiều lắm!</h2>

                <!-- === GLOWING LOVE TIMER === -->
                <div id="love-timer-fw">
                    <div class="fw-timer-label">💕 Chúng ta đã yêu nhau được</div>
                    <div class="fw-timer-digits">
                        <div class="fw-t-block">
                            <span id="fw-days">0</span>
                            <small>ngày</small>
                        </div>
                        <div class="fw-t-sep">:</div>
                        <div class="fw-t-block">
                            <span id="fw-hours">00</span>
                            <small>giờ</small>
                        </div>
                        <div class="fw-t-sep">:</div>
                        <div class="fw-t-block">
                            <span id="fw-minutes">00</span>
                            <small>phút</small>
                        </div>
                        <div class="fw-t-sep">:</div>
                        <div class="fw-t-block glow-seconds">
                            <span id="fw-seconds">00</span>
                            <small>giây</small>
                        </div>
                    </div>
                </div>

                <!-- === EDITABLE MESSAGES === -->
                <!-- Chỉnh sửa nội dung các dòng chữ bên dưới tùy ý -->
                <div class="fw-messages">
                    <p class="fw-msg fw-msg--1">"Em là điều tuyệt vời nhất anh có trong đời"</p>
                </div>

            </div>
        </div>

    </div>

    <!-- Image Lightbox Overlay -->
    <div id="lightbox">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Zoomed Memory">
            <button id="close-lightbox" class="glass-btn">✕ Đóng</button>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="bg-music" src="inlove.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
